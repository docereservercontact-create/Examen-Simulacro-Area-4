<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen UNAM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

#inicio, #resultados {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    height:100vh;
}

input { padding:10px; margin:10px; width:250px; }

button {
    padding:10px 20px;
    background:#2c7be5;
    color:white; border:none;
    cursor:pointer;
}

#examen { display:none; }

.container { display:flex; height:100vh; }

.left { width:50%; background:black; }
.left iframe { width:100%; height:100%; border:none; }

.right {
    width:50%;
    overflow-y:scroll;
    padding:20px;
    background:white;
}

.pregunta {
    margin-bottom:10px;
    padding:10px;
    border-bottom:1px solid #ccc;
}

.timer {
    position:fixed;
    top:10px;
    right:20px;
    background:black;
    color:white;
    padding:10px;
}
</style>
</head>

<body>

<div id="inicio">
    <h2>Examen</h2>
    <input id="nombre" placeholder="Usuario">
    <input id="cuenta" placeholder="Contraseña">
    <button onclick="iniciarExamen()">Iniciar</button>
</div>

<div id="examen">
    <div class="timer" id="timer"></div>

    <div class="container">
        <div class="left">
            <iframe src="examen.pdf"></iframe>
        </div>

        <div class="right" id="respuestas"></div>
    </div>
</div>

<div id="resultados"></div>

<script>

// CONFIG
const TOTAL_PREGUNTAS = 120;
let tiempo = 3600;
let intervalo;
let nombreAlumno, cuentaAlumno;

// 🔑 CLAVE
const clave = [...Array(120)].map((_,i)=>({
    materia:
        i<10?"Física":
        i<20?"Literatura":
        i<30?"Química":
        i<40?"Geografía":
        i<62?"Matemáticas":
        i<80?"Español":
        i<90?"Biología":
        i<100?"Historia Universal":
        i<110?"Historia de México":
        "Filosofía",
    correcta: [
"C","D","A","B","D","D","B","B","A","A",
"A","C","D","C","D","A","A","A","A","A",
"A","D","C","C","B","D","B","B","B","D",
"C","D","B","B","B","B","B","D","D","A",
"C","B","A","B","D","D","A","C","C","B",
"A","A","D","A","A","A","A","D","D","B",
"D","D","C","C","D","C","D","C","C","C",
"C","C","C","A","C","D","A","C","B","D",
"A","A","A","B","B","D","D","C","A","C",
"B","A","B","A","A","A","A","C","B","B",
"C","D","A","D","A","D","B","D","B","D",
"D","C","B","A","D","C","C","C","B","C"
][i]
}));

// INICIAR
function iniciarExamen(){
    nombreAlumno = document.getElementById("nombre").value;
    cuentaAlumno = document.getElementById("cuenta").value;

    document.getElementById("inicio").style.display="none";
    document.getElementById("examen").style.display="block";

    generarPreguntas();
    iniciarTimer();
}

// GENERAR
function generarPreguntas(){

    let cont = document.getElementById("respuestas");
    cont.innerHTML="";

    for(let i=0;i<TOTAL_PREGUNTAS;i++){

        let guardada = localStorage.getItem("resp_"+cuentaAlumno+"_"+i);

        cont.innerHTML+=`
        <div class="pregunta">
            <b>${i+1}</b><br>

            ${["A","B","C","D"].map(l=>`
                <label>
                <input type="radio" name="p${i}" value="${l}"
                ${guardada===l?"checked":""}
                onchange="guardar(${i},'${l}')">
                ${l}
                </label>
            `).join("")}
        </div>`;
    }

    cont.innerHTML+=`<button onclick="terminarExamen()">Enviar</button>`;
}

// GUARDAR
function guardar(i,v){
    localStorage.setItem("resp_"+cuentaAlumno+"_"+i,v);
}

// TIMER
function iniciarTimer(){
    intervalo=setInterval(()=>{
        tiempo--;
        let min=Math.floor(tiempo/60);
        let seg=tiempo%60;

        document.getElementById("timer").innerText=
        `${min}:${seg.toString().padStart(2,'0')}`;

        if(tiempo<=0) terminarExamen();
    },1000);
}

// TERMINAR
function terminarExamen(){

    clearInterval(intervalo);

    let total=0;
    let materias={};
    let detalle="<h3>Detalle</h3><table border='1'><tr><th>#</th><th>Materia</th><th>Tu</th><th>Correcta</th></tr>";

    for(let i=0;i<TOTAL_PREGUNTAS;i++){

        let resp=localStorage.getItem("resp_"+cuentaAlumno+"_"+i)||"-";
        let correcta=clave[i].correcta;
        let materia=clave[i].materia;

        if(!materias[materia]) materias[materia]={c:0,t:0};
        materias[materia].t++;

        if(resp===correcta){
            total++;
            materias[materia].c++;
        }

        let color = resp===correcta?"#c8f7c5":"#f7c5c5";

        detalle+=`
        <tr style="background:${color}">
        <td>${i+1}</td>
        <td>${materia}</td>
        <td>${resp}</td>
        <td>${correcta}</td>
        </tr>`;
    }

    detalle+="</table>";

    let html=`<h2>Resultados</h2>
    <p><b>${nombreAlumno}</b></p>
    <p>Total: ${total}/120</p>
    <p>${((total/120)*100).toFixed(2)}%</p>

    <h3>Por materia</h3>
    <table border="1">
    <tr><th>Materia</th><th>Aciertos</th><th>Total</th><th>%</th></tr>`;

    for(let m in materias){
        let ac=materias[m].c;
        let tot=materias[m].t;
        html+=`<tr><td>${m}</td><td>${ac}</td><td>${tot}</td><td>${((ac/tot)*100).toFixed(1)}%</td></tr>`;
    }

    html+="</table>"+detalle;

    document.getElementById("examen").style.display="none";
    document.getElementById("resultados").style.display="block";
    document.getElementById("resultados").innerHTML=html;
}

</script>

</body>
</html>
